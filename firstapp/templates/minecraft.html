{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Minecraft 1.8.8{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{% static 'firstapp/style.css' %}"/>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; /* prevents scrolling */
      background-color: black;
    }

    /* Navbar fixed at top */
    nav.navbar {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 10000;
    }

    /* Game fills remaining space */
    #game_frame {
      position: absolute;
      top: 56px; /* navbar height */
      left: 0;
      right: 0;
      bottom: 0; /* fill to bottom */
      width: 100%;
      height: auto; /* automatic to fill remaining space */
      background-color: black;
    }

    /* Sidebar ads below navbar */
    #sidebarad1,
    #sidebarad2 {
      position: fixed;
      top: 56px; /* below navbar */
      width: 160px;
      height: 600px;
      z-index: 9999;
    }

    #sidebarad1 { left: 0; }
    #sidebarad2 { right: 0; }

    .sidebar-close {
      position: absolute;
      top: 0;
      right: 0;
      width: 22px;
      height: 22px;
      line-height: 22px;
      text-align: center;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #212121;">
    <a class="navbar-brand" href="{% url 'home' today_str %}">Home</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="{% url 'sandpainting' today_str %}">sandpainting</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'cookie' today_str %}">cookieclicker</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'burrito' today_str %}">burrito guy</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'web' today_str %}">simple web</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'dash' today_str %}">geometry dash</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'minecraft' today_str %}">minecraft</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'RetroBowl' today_str %}">RetroBowl</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'ships3d' today_str %}">Ships 3D</a></li>
        <li class="nav-item">
          <a class="nav-link" href="#" onclick="create('{% url 'home' today_str %}'); return false;">about blank</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Game Frame -->
  <div id="game_frame"></div>

  <!-- Sidebar Ads -->
  <div id="sidebarad1">
    <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
  </div>
  <div id="sidebarad2">
    <div class="sidebar-close" onclick="this.parentElement.style.display='none'">✕</div>
  </div>

  <!-- Eaglercraft Loader -->
  <script type="text/javascript">
    window.disableUserscripts = true;
    window.__eaglercraftLoaderClient = {
      container: "game_frame",
      name: "EaglercraftX 1.8",
      file: "net.lax1dude.eaglercraft.v1_8.client",
      cid: "bafybeigvjbotqwm5mdjkvfqwxylpvap35lmya4d3jo6sn76pqzm2gub52i",
      path: "",
      download: "https://cdn.jsdelivr.net/gh/genizy/mc@main/data/1.8.8.gz",
      dlSize: 14027305,
      gzip: true
    };
  </script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/genizy/mc@main/shared/loader.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.bundle.min.js"></script>

  <!-- About Blank Button Function -->
  <script>
    function create(url) {
      const win = window.open("about:blank", "_blank");
      if (!win) return;
      const iframe = win.document.createElement("iframe");
      iframe.style.border = "none";
      iframe.style.width = "100%";
      iframe.style.height = "100vh";
      iframe.src = url;
      win.document.body.appendChild(iframe);
      window.location.replace("https://www.google.com");
    }
  </script>
</body>
</html>
